# Visual Inventory — Nginx site snippet
# ติดตั้ง: sudo cp docs/deploy/nginx-visual_inventory.conf /etc/nginx/sites-available/visual_inventory
#          sudo ln -s /etc/nginx/sites-available/visual_inventory /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# ปรับ server_name และ fastcgi_pass ให้ตรงเครื่อง (php8.2-fpm หรือ php8.3-fpm)

server {
    listen 80;
    # listen 443 ssl;   # เปิดเมื่อมี TLS
    server_name 172.31.71.125;   # หรือ vi.factory.local

    root /var/www;
    index index.php;

    access_log /var/log/nginx/visual_inventory_access.log;
    error_log  /var/log/nginx/visual_inventory_error.log;

    # --- ป้องกันไฟล์สำคัญ (เทียบ .htaccess + config/.htaccess) ---
    location ~ /\.env {
        deny all;
        return 403;
    }
    location ~ ^/visual_inventory/(config|vendor|maintenance|scripts)(/|$) {
        deny all;
        return 403;
    }

    # --- รากแอป -> public/ ---
    location = /visual_inventory {
        return 301 /visual_inventory/;
    }
    location = /visual_inventory/ {
        return 302 /visual_inventory/public/index;
    }

    # --- API (ไม่ rewrite ไป public/) ---
    location ^~ /visual_inventory/api/ {
        try_files $uri $uri/ =404;
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    # --- Handheld scanner UI ---
    location ^~ /visual_inventory/handheld/ {
        try_files $uri $uri/ @vi_handheld_php;
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
    location @vi_handheld_php {
        rewrite ^/visual_inventory/handheld/(.+)$ /visual_inventory/handheld/$1.php last;
    }

    # --- URL สั้น (ไม่มี /public/) -> public/ เทียบ .htaccess รากโปรเจกต์ ---
    location ~ ^/visual_inventory/(?!public/|api/|handheld/)(.+)$ {
        rewrite ^/visual_inventory/(.*)$ /visual_inventory/public/$1 last;
    }

    # --- หน้าเว็บหลัก ---
    location ^~ /visual_inventory/public/ {
        try_files $uri $uri/ @vi_public_php;
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
    location @vi_public_php {
        rewrite ^/visual_inventory/public/(.+)$ /visual_inventory/public/$1.php last;
    }

    # --- static อื่นในโปรเจกต์ (plugins, assets) ---
    location ~* ^/visual_inventory/.+\.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
