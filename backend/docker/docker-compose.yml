services:
  mysql:
    image: mariadb:10.11
    container_name: visual-location-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${MYSQL_DATABASE:-visual_inventory_db}
      TZ: Asia/Bangkok
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ../database/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: visual-location-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - ./data/redis:/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: visual-location-mqtt
    restart: unless-stopped
    ports:
      - '1883:1883'
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./data/mosquitto:/mosquitto/data

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: visual-location-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      TIMEZONE: Asia/Bangkok
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-visual_inventory_db}
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-min-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-min-32-chars}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      PDSERVICE_BASE_URL: ${PDSERVICE_BASE_URL:-http://194.10.10.89/PDService/Service1.svc/rest}
      CPK_SERVICE_BASE_URL: ${CPK_SERVICE_BASE_URL:-http://194.10.10.15/CPKservice/cpk_service}
      CPK_MC_ID: ${CPK_MC_ID:-}
      CPK_STATION_KEY: ${CPK_STATION_KEY:-}
      TV_KIOSK_KEY: ${TV_KIOSK_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started
      redis:
        condition: service_started

  raspberry-simulator:
    build:
      context: ../../raspi-client
      dockerfile: Dockerfile
    container_name: visual-location-raspi-sim
    restart: unless-stopped
    environment:
      DEVICE_ID: ${RASPI_DEVICE_ID:-1}
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_CLIENT_ID: visual-raspi-sim-1
      MQTT_IO_TOPIC_PREFIX: visual/io
      OUTPUT_COUNT: ${RASPI_OUTPUT_COUNT:-16}
      HEARTBEAT_INTERVAL_SEC: 30
      SIMULATOR_MODE: 'true'
      RASPI_IP: 192.168.99.10
    depends_on:
      mosquitto:
        condition: service_started
