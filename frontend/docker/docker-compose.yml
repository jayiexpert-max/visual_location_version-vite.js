services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3000}
    container_name: visual-location-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-80}:80'
